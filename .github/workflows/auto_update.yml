name: Gold Egypt Auto-Scraper

on:
  schedule:
    - cron: '0 * * * *'
  
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests yfinance pillow plotly streamlit

      - name: 4. Run Update Script
        run: |
          SCRIPT_PATH=$(find . -name "Gold_Egypt_App.py" | head -n 1)
          python "$SCRIPT_PATH" --update

      - name: 5. Save Timestamp (Cairo)
        run: |
          TZ="Africa/Cairo" date +"%Y-%m-%d %H:%M:%S" > last_update.txt

      - name: 6. Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add 02_Dataset/Gold_Egypt.csv 02_Dataset/Gold_Egypt_Processed.csv last_update.txt
          
          git commit -m "🤖 Auto-update Gold Dataset $(date)" || echo "No changes"
          
          git push