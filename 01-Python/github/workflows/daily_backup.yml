name: Gold Data Auto-Update & Backup

on:
  schedule:
    - cron: '0 12,0 * * *'
  workflow_dispatch: 

jobs:
  update_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 🟢 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Install Dependencies
        run: |
          pip install pandas numpy requests yfinance plotly streamlit

      - name: 🔄 Run Update Script
        run: |
          python Gold_Egypt_App.py --update

      - name: 💾 Commit and Push Backup
        run: |
          git config --global user.name "GoldBot-Backup"
          git config --global user.email "actions@github.com"
          git add Gold_Egypt.csv
          git commit -m "📊 Auto-Update: Gold Prices $(date)" || exit 0
          git push